<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorize - OAuth Provider</title>
  <style>
    :root {
      --bg-color: #0f0f0f;
      --form-bg: #1c1c1c;
      --input-bg: #2a2a2a;
      --input-border: #3a3a3a;
      --text-main: #ffffff;
      --text-muted: #9e9e9e;
      --accent-color: #2b9d6c;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --font-serif: 'Playfair Display', Georgia, serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      font-family: var(--font-sans);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .auth-container {
      background-color: var(--form-bg);
      padding: 40px;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: none;
    }

    .app-info {
      text-align: center;
      margin-bottom: 16px;
      padding: 12px;
      background: rgba(43, 157, 108, 0.08);
      border: 1px solid rgba(43, 157, 108, 0.2);
      border-radius: 8px;
    }

    .app-info p {
      color: var(--text-muted);
      font-size: 13px;
    }

    .app-info .app-name {
      color: var(--accent-color);
      font-weight: 600;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h1 {
      font-family: var(--font-serif);
      color: var(--text-main);
      font-size: 28px;
      font-weight: 500;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-row {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-row .form-group {
      margin-bottom: 0;
      flex: 1;
    }

    label {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    label span {
      color: var(--accent-color);
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 16px;
      height: 16px;
      pointer-events: none;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    input[type="url"] {
      width: 100%;
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-main);
      padding: 12px 12px 12px 12px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .has-icon input {
      padding-left: 36px;
    }

    input:focus {
      border-color: var(--accent-color);
    }

    a {
      color: var(--accent-color);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .btn-submit {
      width: 100%;
      background-color: var(--accent-color);
      color: #ffffff;
      border: none;
      padding: 14px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
      margin-top: 10px;
    }

    .btn-submit:hover {
      background-color: #24865b;
    }

    .auth-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-text {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: var(--text-muted);
    }

    .status-text.success {
      color: #77d7a9;
    }

    .status-text.error {
      color: #ff8e8e;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <div class="auth-container">

    <div id="app-info-section" class="app-info hidden">
      <p><span class="app-name" id="appNameDisplay"></span> wants to access your account</p>
    </div>

    <div class="auth-header">
      <h1 id="form-title">Create an account</h1>
    </div>

    <form id="auth-form">
      <div id="signup-fields">
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First name <span>*</span></label>
            <input type="text" id="firstName">
          </div>
          <div class="form-group">
            <label for="lastName">Last name <span>*</span></label>
            <input type="text" id="lastName">
          </div>
        </div>

        <div class="form-group">
          <label for="profileImageUrl">Profile Image URL (Optional)</label>
          <input type="url" id="profileImageUrl">
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email <span>*</span></label>
        <div class="input-wrapper has-icon">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
            <path d="M2 4l10 8 10-8"></path>
          </svg>
          <input type="email" id="email" required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password <span>*</span></label>
        <div class="input-wrapper has-icon">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" required>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">Continue</button>
      <p id="status-text" class="status-text"></p>
    </form>

    <div class="auth-footer">
      <span id="toggle-text">Already have an account?</span>
      <a href="#" id="toggle-btn">Sign in</a>
    </div>
  </div>


  <script>
    // Read OAuth context injected by the server
    const oauthContext = window.__OAUTH_CONTEXT__ || null;

    const formTitle = document.getElementById("form-title");
    const authForm = document.getElementById("auth-form");
    const signupFields = document.getElementById("signup-fields");
    const submitBtn = document.getElementById("submit-btn");
    const toggleText = document.getElementById("toggle-text");
    const toggleBtn = document.getElementById("toggle-btn");
    const statusText = document.getElementById("status-text");
    const appInfoSection = document.getElementById("app-info-section");
    const appNameDisplay = document.getElementById("appNameDisplay");

    const firstNameInput = document.getElementById("firstName");
    const lastNameInput = document.getElementById("lastName");
    const profileImageUrlInput = document.getElementById("profileImageUrl");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    // Show the app name if we have OAuth context
    if (oauthContext && oauthContext.appName) {
      appNameDisplay.textContent = oauthContext.appName;
      appInfoSection.classList.remove("hidden");
    }

    let isSignupMode = true;

    const setStatus = (message, type = "") => {
      statusText.textContent = message;
      statusText.classList.remove("success", "error");
      if (type) {
        statusText.classList.add(type);
      }
    };

    const updateFormMode = () => {
      if (isSignupMode) {
        formTitle.textContent = "Create an account";
        submitBtn.textContent = "Sign up";
        toggleText.textContent = "Already have an account?";
        toggleBtn.textContent = "Sign in";
        signupFields.classList.remove("hidden");
        firstNameInput.required = true;
        lastNameInput.required = true;
      } else {
        formTitle.textContent = "Welcome back";
        submitBtn.textContent = "Sign in";
        toggleText.textContent = "New here?";
        toggleBtn.textContent = "Create account";
        signupFields.classList.add("hidden");
        firstNameInput.required = false;
        lastNameInput.required = false;
      }
      setStatus("");
    };

    toggleBtn.addEventListener("click", (event) => {
      event.preventDefault();
      isSignupMode = !isSignupMode;
      updateFormMode();
    });

    authForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      setStatus("");

      if (isSignupMode) {
        // Handle signup
        const payload = {
          firstName: firstNameInput.value.trim(),
          lastName: lastNameInput.value.trim(),
          email: emailInput.value.trim(),
          password: passwordInput.value,
          profilePicture: profileImageUrlInput.value.trim() || undefined,
        };

        submitBtn.disabled = true;
        submitBtn.textContent = "Signing up...";

        try {
          const response = await fetch("/signup", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            setStatus(data?.message || "Signup failed. Please try again.", "error");
            return;
          }

          setStatus("Signup successful. You can sign in now.", "success");
          isSignupMode = false;
          updateFormMode();
          passwordInput.value = "";
        } catch (_error) {
          setStatus("Network error. Please check your connection.", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = isSignupMode ? "Sign up" : "Sign in";
        }

      } else {
        // Handle login — this is the authorization step
        const payload = {
          email: emailInput.value.trim(),
          password: passwordInput.value,
        };

        // Attach OAuth context for the authorization code flow
        if (oauthContext) {
          payload.client_id = oauthContext.clientId;
          payload.redirect_uri = oauthContext.redirectUri;
          payload.state = oauthContext.state;
          payload.scope = oauthContext.scope;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Signing in...";

        try {
          const response = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          const data = await response.json().catch(() => ({}));

          if (!response.ok) {
            setStatus(data?.message || "Login failed. Please try again.", "error");
            return;
          }

          // If we have a redirect URL (OIDC flow), redirect the user
          if (data.redirect_url) {
            setStatus("Login successful. Redirecting...", "success");
            setTimeout(() => {
              window.location.href = data.redirect_url;
            }, 500);
          } else {
            setStatus("Login successful.", "success");
          }
        } catch (_error) {
          setStatus("Network error. Please check your connection.", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = isSignupMode ? "Sign up" : "Sign in";
        }
      }
    });

    updateFormMode();
  </script>

</body>

</html>
